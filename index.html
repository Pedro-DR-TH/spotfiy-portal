<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1b3e;
    --surface: rgba(255,255,255,0.06);
    --surface2: rgba(255,255,255,0.10);
    --text: #ffffff;
    --muted: rgba(255,255,255,0.55);
    --dim: rgba(255,255,255,0.25);
    --progress-bg: rgba(255,255,255,0.2);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at 70% 50%, #1a2f6e 0%, #0d1b3e 45%, #080f22 100%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    width: 960px;
    height: 480px;
    overflow: hidden;
    position: relative;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
    padding: 40px;
  }

  #auth-screen h1 {
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--text);
    opacity: 0.8;
  }

  .setup-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }

  .setup-row label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    width: 90px;
    text-align: right;
  }

  .setup-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--dim);
    border-radius: 6px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
  }

  .setup-row input:focus { border-color: rgba(255,255,255,0.6); }

  #connect-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 24px;
    color: #fff;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 36px;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  #connect-btn:hover { background: rgba(255,255,255,0.25); }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    max-width: 480px;
  }
  .hint a { color: #fff; text-decoration: none; opacity: 0.7; }

  /* ── PLAYER SCREEN ── */
  #player-screen {
    display: none;
    width: 960px;
    height: 480px;
    position: relative;
    flex-direction: column;
    padding: 24px 32px 20px;
  }

  /* TOP ROW */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .recently-played-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  .recently-played-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .recent-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: pointer;
    width: 72px;
  }

  .recent-item img {
    width: 72px;
    height: 72px;
    border-radius: 6px;
    object-fit: cover;
    opacity: 0.85;
    transition: opacity 0.2s;
  }

  .recent-item:hover img { opacity: 1; }

  .recent-track {
    font-size: 10px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .recent-artist {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #clock {
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: 0.02em;
    line-height: 1;
    text-align: right;
  }

  /* BOTTOM ROW */
  .bottom-row {
    display: flex;
    gap: 32px;
    align-items: flex-end;
    flex: 1;
    min-height: 0;
  }

  #art-wrap {
    width: 200px;
    height: 200px;
    flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }

  #art-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #art-placeholder {
    width: 100%;
    height: 100%;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #art-placeholder svg { width: 48px; height: 48px; fill: var(--dim); }

  .player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding-bottom: 4px;
    gap: 10px;
    min-width: 0;
  }

  #track-name {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.1;
  }

  #artist-name {
    font-size: 16px;
    font-weight: 400;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .progress-block { display: flex; flex-direction: column; gap: 5px; }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    cursor: pointer;
  }

  #progress-fill {
    height: 100%;
    background: var(--text);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
    pointer-events: none;
  }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .ctrl-left, .ctrl-center, .ctrl-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-right { width: 160px; justify-content: flex-end; }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }

  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.active { color: var(--text); opacity: 1; }
  .ctrl-btn svg { width: 20px; height: 20px; fill: currentColor; }

  #play-btn {
    width: 48px;
    height: 48px;
    background: var(--text);
    border-radius: 50%;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  #play-btn:hover { transform: scale(1.05); }
  #play-btn svg { width: 22px; height: 22px; fill: #0d1b3e; }

  .vol-icon svg { width: 16px; height: 16px; fill: var(--muted); }

  #vol-slider {
    width: 90px;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--progress-bg);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  #nothing-playing {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    background: rgba(8,15,34,0.85);
    z-index: 10;
  }
  #nothing-playing p { font-size: 13px; color: var(--muted); }
  #nothing-playing svg { width: 32px; height: 32px; fill: var(--dim); }

  #error-toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(192,57,43,0.9);
    color: #fff;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    display: none;
    z-index: 100;
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>SPOTIFY DESK PORTAL</h1>
  <div class="setup-row">
    <label>CLIENT ID</label>
    <input type="text" id="client-id-input" placeholder="Paste your Spotify Client ID here" autocomplete="off" spellcheck="false">
  </div>
  <button id="connect-btn">Connect to Spotify</button>
  <p class="hint">
    Get a free Client ID at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> → Create App.<br>
    Set the Redirect URI to exactly: <strong id="redirect-uri-display"></strong>
  </p>
</div>

<!-- PLAYER SCREEN -->
<div id="player-screen">

  <div id="nothing-playing">
    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    <p>Nothing playing</p>
  </div>

  <div class="top-row">
    <div>
      <div class="recently-played-label">Recently Played</div>
      <div class="recently-played-row" id="recent-row"></div>
    </div>
    <div id="clock">--:-- --</div>
  </div>

  <div class="bottom-row">
    <div id="art-wrap">
      <img id="art-img" src="" alt="Album art">
      <div id="art-placeholder">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
    </div>

    <div class="player-panel">
      <div>
        <div id="track-name">—</div>
        <div id="artist-name">—</div>
      </div>

      <div class="progress-block">
        <div class="progress-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
        <div class="progress-bar-wrap" id="seek-bar">
          <div id="progress-fill"></div>
        </div>
      </div>

      <div class="controls-row">
        <div class="ctrl-left">
          <button class="ctrl-btn" id="shuffle-btn" title="Shuffle">
            <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
          </button>
        </div>

        <div class="ctrl-center">
          <button class="ctrl-btn" id="prev-btn" title="Previous">
            <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn" id="play-btn" title="Play/Pause">
            <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="ctrl-btn" id="next-btn" title="Next">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <div class="ctrl-right">
          <span class="vol-icon"><svg viewBox="0 0 24 24"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg></span>
          <input type="range" id="vol-slider" min="0" max="100" value="50">
          <button class="ctrl-btn" id="repeat-btn" title="Repeat">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="error-toast"></div>

<script>
const SCOPES = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing',
  'user-read-recently-played'
].join(' ');

const REDIRECT_URI = window.location.origin + window.location.pathname;
document.getElementById('redirect-uri-display').textContent = REDIRECT_URI;

let accessToken = null;
let tokenExpiry = 0;
let refreshToken = null;
let clientId = localStorage.getItem('sp_client_id') || '';
let pollInterval = null;
let currentTrackId = null;
let isPlaying = false;

if (clientId) document.getElementById('client-id-input').value = clientId;

function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generatePKCE() {
  const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
  const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64urlEncode(hashed);
  return { verifier, challenge };
}

(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    const verifier = sessionStorage.getItem('sp_verifier');
    const id = localStorage.getItem('sp_client_id');
    if (!verifier || !id) { showSetup(); return; }
    window.history.replaceState({}, document.title, window.location.pathname);
    const body = new URLSearchParams({ grant_type: 'authorization_code', code, redirect_uri: REDIRECT_URI, client_id: id, code_verifier: verifier });
    const r = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
    const data = await r.json();
    if (data.access_token) { saveTokens(data); showPlayer(); }
    else showError('Auth failed: ' + (data.error_description || data.error));
    return;
  }
  if (loadTokens()) showPlayer();
})();

function saveTokens(data) {
  accessToken = data.access_token;
  tokenExpiry = Date.now() + data.expires_in * 1000;
  refreshToken = data.refresh_token || localStorage.getItem('sp_refresh');
  localStorage.setItem('sp_refresh', refreshToken);
  sessionStorage.setItem('sp_token', accessToken);
  sessionStorage.setItem('sp_expiry', tokenExpiry);
}

function loadTokens() {
  const t = sessionStorage.getItem('sp_token');
  const e = sessionStorage.getItem('sp_expiry');
  const r = localStorage.getItem('sp_refresh');
  if (t && e && Date.now() < parseInt(e) - 60000) {
    accessToken = t; tokenExpiry = parseInt(e); refreshToken = r; return true;
  }
  return false;
}

async function refreshAccessToken() {
  const r = localStorage.getItem('sp_refresh');
  const id = localStorage.getItem('sp_client_id');
  if (!r || !id) { reauth(); return false; }
  const body = new URLSearchParams({ grant_type: 'refresh_token', refresh_token: r, client_id: id });
  const res = await fetch('https://accounts.spotify.com/api/token', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body });
  const data = await res.json();
  if (data.access_token) { saveTokens(data); return true; }
  reauth(); return false;
}

document.getElementById('connect-btn').addEventListener('click', async () => {
  const id = document.getElementById('client-id-input').value.trim();
  if (!id) { showError('Paste your Client ID first'); return; }
  localStorage.setItem('sp_client_id', id);
  clientId = id;
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('sp_verifier', verifier);
  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', id);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);
  window.location.href = url.toString();
});

function showSetup() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('player-screen').style.display = 'none';
}

function showPlayer() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'flex';
  startClock();
  fetchPlayback();
  fetchRecentlyPlayed();
  pollInterval = setInterval(fetchPlayback, 2000);
  setInterval(fetchRecentlyPlayed, 30000);
  setupControls();
}

function startClock() {
  function tick() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')} ${ampm}`;
  }
  tick();
  setInterval(tick, 10000);
}

async function api(endpoint, method = 'GET', body = null) {
  if (Date.now() > tokenExpiry - 60000) {
    const ok = await refreshAccessToken();
    if (!ok) return null;
  }
  const opts = { method, headers: { Authorization: `Bearer ${accessToken}` } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`https://api.spotify.com/v1${endpoint}`, opts);
  if (r.status === 401) { reauth(); return null; }
  if (r.status === 204 || r.status === 202 || r.status === 200) {
    if (r.status === 204) return {};
    try { return await r.json(); } catch { return {}; }
  }
  return null;
}

function reauth() {
  sessionStorage.clear();
  localStorage.removeItem('sp_refresh');
  showSetup();
}

async function fetchRecentlyPlayed() {
  const data = await api('/me/player/recently-played?limit=5');
  if (!data || !data.items) return;
  const row = document.getElementById('recent-row');
  row.innerHTML = '';
  const seen = new Set();
  for (const item of data.items) {
    const t = item.track;
    if (seen.has(t.id)) continue;
    seen.add(t.id);
    const img = t.album.images[1]?.url || t.album.images[0]?.url;
    const el = document.createElement('div');
    el.className = 'recent-item';
    el.innerHTML = `<img src="${img}" alt="${t.name}"><div class="recent-track">${t.name}</div><div class="recent-artist">${t.artists[0].name}</div>`;
    el.addEventListener('click', async () => {
      await api('/me/player/play', 'PUT', { uris: [t.uri] });
      setTimeout(fetchPlayback, 400);
    });
    row.appendChild(el);
    if (row.children.length >= 3) break;
  }
}

async function fetchPlayback() {
  const data = await api('/me/player');
  if (!data || !data.item) { showNothingPlaying(); return; }
  hideNothingPlaying();
  updateUI(data);
}

function updateUI(data) {
  const track = data.item;
  isPlaying = data.is_playing;
  if (track.id !== currentTrackId) {
    currentTrackId = track.id;
    document.getElementById('track-name').textContent = track.name;
    document.getElementById('artist-name').textContent = track.artists.map(a => a.name).join(', ');
    const img = track.album.images[0]?.url;
    if (img) {
      document.getElementById('art-img').src = img;
      document.getElementById('art-img').style.display = 'block';
      document.getElementById('art-placeholder').style.display = 'none';
    }
  }
  const prog = data.progress_ms, dur = track.duration_ms;
  document.getElementById('progress-fill').style.width = `${(prog / dur) * 100}%`;
  document.getElementById('time-current').textContent = msToTime(prog);
  document.getElementById('time-total').textContent = msToTime(dur);
  document.getElementById('play-icon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
  document.getElementById('shuffle-btn').classList.toggle('active', data.shuffle_state);
  document.getElementById('repeat-btn').classList.toggle('active', data.repeat_state !== 'off');
  if (data.device?.volume_percent !== null && data.device?.volume_percent !== undefined)
    document.getElementById('vol-slider').value = data.device.volume_percent;
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2,'0')}`;
}

function showNothingPlaying() { document.getElementById('nothing-playing').style.display = 'flex'; }
function hideNothingPlaying() { document.getElementById('nothing-playing').style.display = 'none'; }

function setupControls() {
  document.getElementById('play-btn').addEventListener('click', async () => {
    if (isPlaying) await api('/me/player/pause', 'PUT');
    else await api('/me/player/play', 'PUT');
    setTimeout(fetchPlayback, 300);
  });
  document.getElementById('next-btn').addEventListener('click', async () => {
    await api('/me/player/next', 'POST'); setTimeout(fetchPlayback, 500);
  });
  document.getElementById('prev-btn').addEventListener('click', async () => {
    await api('/me/player/previous', 'POST'); setTimeout(fetchPlayback, 500);
  });
  document.getElementById('shuffle-btn').addEventListener('click', async () => {
    const cur = document.getElementById('shuffle-btn').classList.contains('active');
    await api(`/me/player/shuffle?state=${!cur}`, 'PUT'); setTimeout(fetchPlayback, 300);
  });
  document.getElementById('repeat-btn').addEventListener('click', async () => {
    const cur = document.getElementById('repeat-btn').classList.contains('active');
    await api(`/me/player/repeat?state=${cur ? 'off' : 'context'}`, 'PUT'); setTimeout(fetchPlayback, 300);
  });
  let volTimeout;
  document.getElementById('vol-slider').addEventListener('input', (e) => {
    clearTimeout(volTimeout);
    volTimeout = setTimeout(async () => { await api(`/me/player/volume?volume_percent=${e.target.value}`, 'PUT'); }, 300);
  });
  document.getElementById('seek-bar').addEventListener('click', async (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const dur = parseInt(document.getElementById('time-total').textContent.split(':').reduce((a,b) => a*60+parseInt(b),0)) * 1000;
    await api(`/me/player/seek?position_ms=${Math.floor(pct * dur)}`, 'PUT'); setTimeout(fetchPlayback, 300);
  });
}

function showError(msg) {
  const t = document.getElementById('error-toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
