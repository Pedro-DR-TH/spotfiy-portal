<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
  :root {
    --blue: #0000A3;
    --green-dim: #158a3e;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --text: #ffffff;
    --muted: #888;
    --dim: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cabin', sans-serif;
    width: 960px;
    height: 480px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── AUTH SCREEN ── */
  #auth-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 20px;
    padding: 40px;
  }

  #auth-screen h1 {
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--blue);
  }

  .setup-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 500px;
  }

  .setup-row label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    width: 90px;
    text-align: right;
  }

  .setup-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--dim);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 8px 12px;
    outline: none;
  }

  .setup-row input:focus { border-color: var(--blue); }

  #connect-btn {
    background: var(--blue);
    border: none;
    border-radius: 24px;
    color: #000;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 36px;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }
  #connect-btn:hover { background: #1ed760; }

  .hint {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
    max-width: 480px;
  }
  .hint a { color: var(--blue); text-decoration: none; }

  /* ── PLAYER SCREEN ── */
  #player-screen {
    display: none;
    height: 100%;
    flex-direction: row;
  }

  /* Left panel — album art */
  .art-panel {
    width: 200px;
    height: 480px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  #art-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(30px) brightness(0.3);
    transform: scale(1.2);
    transition: background-image 0.8s;
  }

  #art-img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 148px;
    height: 148px;
    border-radius: 6px;
    object-fit: cover;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: opacity 0.4s;
  }

  #art-placeholder {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 148px;
    height: 148px;
    border-radius: 6px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #art-placeholder svg { width: 48px; height: 48px; fill: var(--dim); }

  /* Right panel */
  .info-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 18px 20px 14px;
    position: relative;
    overflow: hidden;
  }

  /* Top bar: clock + device */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  #clock {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
  }

  #date {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 300;
  }

  .device-info {
    text-align: right;
  }

  #device-name {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
    justify-content: flex-end;
  }

  #device-name svg { width: 12px; height: 12px; fill: var(--muted); }

  /* Track info */
  .track-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 0;
  }

  #track-name {
    font-size: 20px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  #artist-name {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  #album-name {
    font-size: 11px;
    color: var(--dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Progress */
  .progress-block {
    margin-bottom: 10px;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 5px;
    cursor: pointer;
    position: relative;
  }

  #progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    width: 0%;
    transition: width 1s linear;
    pointer-events: none;
  }

  .progress-times {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .ctrl-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    padding: 6px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s, background 0.15s;
  }

  .ctrl-btn:hover { color: var(--text); background: var(--surface2); }
  .ctrl-btn.active { color: var(--green); }
  .ctrl-btn svg { width: 18px; height: 18px; fill: currentColor; }

  #play-btn {
    width: 44px;
    height: 44px;
    background: var(--text);
    border-radius: 50%;
    color: #000;
    flex-shrink: 0;
  }

  #play-btn:hover { background: #ddd; }
  #play-btn svg { width: 20px; height: 20px; }

  /* Volume */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vol-icon { color: var(--dim); }
  .vol-icon svg { width: 14px; height: 14px; fill: currentColor; }

  #vol-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }

  #vol-slider:hover::-webkit-slider-thumb { background: var(--text); }

  /* Nothing playing state */
  #nothing-playing {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    background: rgba(10,10,10,0.85);
  }

  #nothing-playing p { font-size: 13px; color: var(--muted); }
  #nothing-playing svg { width: 32px; height: 32px; fill: var(--dim); }

  /* Error toast */
  #error-toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: #c0392b;
    color: #fff;
    font-size: 12px;
    padding: 6px 16px;
    border-radius: 20px;
    display: none;
    z-index: 100;
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <h1>SPOTIFY DESK PORTAL</h1>
  <div class="setup-row">
    <label>CLIENT ID</label>
    <input type="text" id="client-id-input" placeholder="Paste your Spotify Client ID here" autocomplete="off" spellcheck="false">
  </div>
  <button id="connect-btn">Connect to Spotify</button>
  <p class="hint">
    Get a free Client ID at <a href="https://developer.spotify.com/dashboard" target="_blank">developer.spotify.com/dashboard</a> → Create App.<br>
    Set the Redirect URI to exactly: <strong id="redirect-uri-display"></strong>
  </p>
</div>

<!-- PLAYER SCREEN -->
<div id="player-screen">
  <div class="art-panel">
    <div id="art-bg"></div>
    <img id="art-img" src="" alt="Album art" style="display:none;">
    <div id="art-placeholder">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    </div>
  </div>

  <div class="info-panel">
    <div id="nothing-playing" style="display:none; position:absolute; inset:0; align-items:center; justify-content:center; flex-direction:column; gap:8px; background:rgba(10,10,10,0.7);">
      <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      <p>Nothing playing</p>
    </div>

    <div class="topbar">
      <div>
        <div id="clock">--:--</div>
        <div id="date"></div>
      </div>
      <div class="device-info">
        <div id="device-name">
          <svg viewBox="0 0 24 24"><path d="M17 2H7c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H7V4h10v12z"/></svg>
          <span id="device-label">—</span>
        </div>
      </div>
    </div>

    <div class="track-block">
      <div id="track-name">—</div>
      <div id="artist-name">—</div>
      <div id="album-name">—</div>
    </div>

    <div class="progress-block">
      <div class="progress-bar-wrap" id="seek-bar">
        <div id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" id="shuffle-btn" title="Shuffle">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn" id="prev-btn" title="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
      </div>

      <button class="ctrl-btn" id="play-btn" title="Play/Pause">
        <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>

      <div class="ctrl-group">
        <button class="ctrl-btn" id="next-btn" title="Next">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="ctrl-btn" id="repeat-btn" title="Repeat">
          <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
        </button>
      </div>
    </div>

    <div class="vol-row">
      <span class="vol-icon"><svg viewBox="0 0 24 24"><path d="M7 9v6h4l5 5V4l-5 5H7z"/></svg></span>
      <input type="range" id="vol-slider" min="0" max="100" value="50">
      <span class="vol-icon"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></span>
    </div>
  </div>
</div>

<div id="error-toast"></div>

<script>
const SCOPES = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing'
].join(' ');

const REDIRECT_URI = window.location.origin + window.location.pathname;
document.getElementById('redirect-uri-display').textContent = REDIRECT_URI;

let accessToken = null;
let tokenExpiry = 0;
let refreshToken = null;
let clientId = localStorage.getItem('sp_client_id') || '';
let pollInterval = null;
let currentTrackId = null;
let isPlaying = false;

if (clientId) document.getElementById('client-id-input').value = clientId;

// ── PKCE helpers ──
function base64urlEncode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generatePKCE() {
  const verifier = base64urlEncode(crypto.getRandomValues(new Uint8Array(32)));
  const hashed = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64urlEncode(hashed);
  return { verifier, challenge };
}

// ── Boot: check for auth code callback or saved token ──
(async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    // Exchange code for token
    const verifier = sessionStorage.getItem('sp_verifier');
    const id = localStorage.getItem('sp_client_id');
    if (!verifier || !id) { showSetup(); return; }

    window.history.replaceState({}, document.title, window.location.pathname);

    const body = new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      client_id: id,
      code_verifier: verifier,
    });

    const r = await fetch('https://accounts.spotify.com/api/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body,
    });

    const data = await r.json();
    if (data.access_token) {
      saveTokens(data);
      showPlayer();
    } else {
      showError('Auth failed: ' + (data.error_description || data.error));
    }
    return;
  }

  // Check saved tokens
  const saved = loadTokens();
  if (saved) {
    showPlayer();
  }
})();

function saveTokens(data) {
  accessToken = data.access_token;
  tokenExpiry = Date.now() + data.expires_in * 1000;
  refreshToken = data.refresh_token || localStorage.getItem('sp_refresh');
  localStorage.setItem('sp_refresh', refreshToken);
  sessionStorage.setItem('sp_token', accessToken);
  sessionStorage.setItem('sp_expiry', tokenExpiry);
}

function loadTokens() {
  const t = sessionStorage.getItem('sp_token');
  const e = sessionStorage.getItem('sp_expiry');
  const r = localStorage.getItem('sp_refresh');
  if (t && e && Date.now() < parseInt(e) - 60000) {
    accessToken = t;
    tokenExpiry = parseInt(e);
    refreshToken = r;
    return true;
  }
  return false;
}

async function refreshAccessToken() {
  const r = localStorage.getItem('sp_refresh');
  const id = localStorage.getItem('sp_client_id');
  if (!r || !id) { reauth(); return false; }

  const body = new URLSearchParams({
    grant_type: 'refresh_token',
    refresh_token: r,
    client_id: id,
  });

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });

  const data = await res.json();
  if (data.access_token) {
    saveTokens(data);
    return true;
  }
  reauth();
  return false;
}

document.getElementById('connect-btn').addEventListener('click', async () => {
  const id = document.getElementById('client-id-input').value.trim();
  if (!id) { showError('Paste your Client ID first'); return; }
  localStorage.setItem('sp_client_id', id);
  clientId = id;

  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('sp_verifier', verifier);

  const url = new URL('https://accounts.spotify.com/authorize');
  url.searchParams.set('client_id', id);
  url.searchParams.set('response_type', 'code');
  url.searchParams.set('redirect_uri', REDIRECT_URI);
  url.searchParams.set('scope', SCOPES);
  url.searchParams.set('code_challenge_method', 'S256');
  url.searchParams.set('code_challenge', challenge);

  window.location.href = url.toString();
});

function showSetup() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('player-screen').style.display = 'none';
}

function showPlayer() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'flex';
  startClock();
  fetchPlayback();
  pollInterval = setInterval(fetchPlayback, 2000);
  setupControls();
}

// ── CLOCK ──
function startClock() {
  function tick() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('clock').textContent = `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
    document.getElementById('date').textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
  }
  tick();
  setInterval(tick, 10000);
}

// ── API ──
async function api(endpoint, method = 'GET', body = null) {
  if (Date.now() > tokenExpiry - 60000) {
    const ok = await refreshAccessToken();
    if (!ok) return null;
  }
  const opts = { method, headers: { Authorization: `Bearer ${accessToken}` } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const r = await fetch(`https://api.spotify.com/v1${endpoint}`, opts);
  if (r.status === 401) { reauth(); return null; }
  if (r.status === 204 || r.status === 202 || r.status === 200) {
    if (r.headers.get('content-length') === '0' || r.status === 204) return {};
    try { return await r.json(); } catch { return {}; }
  }
  return null;
}

function reauth() {
  sessionStorage.clear();
  localStorage.removeItem('sp_refresh');
  showSetup();
}

// ── PLAYBACK ──
async function fetchPlayback() {
  const data = await api('/me/player');
  if (!data || !data.item) {
    showNothingPlaying();
    return;
  }
  hideNothingPlaying();
  updateUI(data);
}

function updateUI(data) {
  const track = data.item;
  isPlaying = data.is_playing;

  // Track changed?
  if (track.id !== currentTrackId) {
    currentTrackId = track.id;
    document.getElementById('track-name').textContent = track.name;
    document.getElementById('artist-name').textContent = track.artists.map(a => a.name).join(', ');
    document.getElementById('album-name').textContent = track.album.name;

    const img = track.album.images[0]?.url;
    if (img) {
      document.getElementById('art-img').src = img;
      document.getElementById('art-img').style.display = 'block';
      document.getElementById('art-placeholder').style.display = 'none';
      document.getElementById('art-bg').style.backgroundImage = `url(${img})`;
    }
  }

  // Progress
  const prog = data.progress_ms;
  const dur = track.duration_ms;
  document.getElementById('progress-fill').style.width = `${(prog / dur) * 100}%`;
  document.getElementById('time-current').textContent = msToTime(prog);
  document.getElementById('time-total').textContent = msToTime(dur);

  // Play/pause icon
  document.getElementById('play-icon').innerHTML = isPlaying
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';

  // Shuffle / repeat
  document.getElementById('shuffle-btn').classList.toggle('active', data.shuffle_state);
  document.getElementById('repeat-btn').classList.toggle('active', data.repeat_state !== 'off');

  // Device
  if (data.device) {
    document.getElementById('device-label').textContent = data.device.name;
    const vol = data.device.volume_percent;
    if (vol !== null) document.getElementById('vol-slider').value = vol;
  }
}

function msToTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2,'0')}`;
}

function showNothingPlaying() {
  document.getElementById('nothing-playing').style.display = 'flex';
}
function hideNothingPlaying() {
  document.getElementById('nothing-playing').style.display = 'none';
}

// ── CONTROLS ──
function setupControls() {
  document.getElementById('play-btn').addEventListener('click', async () => {
    if (isPlaying) {
      await api('/me/player/pause', 'PUT');
    } else {
      await api('/me/player/play', 'PUT');
    }
    setTimeout(fetchPlayback, 300);
  });

  document.getElementById('next-btn').addEventListener('click', async () => {
    await api('/me/player/next', 'POST');
    setTimeout(fetchPlayback, 500);
  });

  document.getElementById('prev-btn').addEventListener('click', async () => {
    await api('/me/player/previous', 'POST');
    setTimeout(fetchPlayback, 500);
  });

  document.getElementById('shuffle-btn').addEventListener('click', async () => {
    const current = document.getElementById('shuffle-btn').classList.contains('active');
    await api(`/me/player/shuffle?state=${!current}`, 'PUT');
    setTimeout(fetchPlayback, 300);
  });

  document.getElementById('repeat-btn').addEventListener('click', async () => {
    const current = document.getElementById('repeat-btn').classList.contains('active');
    await api(`/me/player/repeat?state=${current ? 'off' : 'context'}`, 'PUT');
    setTimeout(fetchPlayback, 300);
  });

  let volTimeout;
  document.getElementById('vol-slider').addEventListener('input', (e) => {
    clearTimeout(volTimeout);
    volTimeout = setTimeout(async () => {
      await api(`/me/player/volume?volume_percent=${e.target.value}`, 'PUT');
    }, 300);
  });

  document.getElementById('seek-bar').addEventListener('click', async (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    const dur = parseInt(document.getElementById('time-total').textContent.split(':').reduce((a,b) => a*60+parseInt(b),0)) * 1000;
    await api(`/me/player/seek?position_ms=${Math.floor(pct * dur)}`, 'PUT');
    setTimeout(fetchPlayback, 300);
  });
}

function showError(msg) {
  const t = document.getElementById('error-toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
